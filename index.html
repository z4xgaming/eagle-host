<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS COMMANDER | MASTER DATABASE</title>
    <style>
        :root { --neon: #00ffcc; --dark: #0a0a0a; --gold: #ffd700; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        
        /* Premium Glassy Header */
        .header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid var(--neon);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px var(--neon);
            margin-bottom: 30px;
        }

        /* Unlimited Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 10px;
        }

        .card {
            background: #111;
            border-left: 5px solid var(--neon);
            padding: 15px;
            border-radius: 8px;
            text-align: left;
            position: relative;
            transition: 0.3s;
        }

        .card:hover { transform: scale(1.02); box-shadow: 0 0 15px var(--neon); }

        .code-box {
            background: #000;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            color: #ccc;
            margin: 10px 0;
            border: 1px dashed #444;
            white-space: pre;
        }

        button {
            background: var(--neon);
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        .footer { margin-top: 50px; color: #444; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>NEXUS COMMANDER v3.0</h1>
        <p>SEASON 0 | UNLIMITED EVOLUTION DATABASE</p>
        <p style="color: var(--neon);">Status: Premium Member</p>
    </div>

    <div class="grid" id="mainGrid">
        </div>

    <div class="footer">
        <p>POWERED BY TERMUX | GENERATED BY NEXUS_ENGINE</p>
    </div>

    <script>
        const grid = document.getElementById('mainGrid');
        const symbols = ["в—ўв–“в–“в–“в–“в–“в–“в–Җв–Җ", "в—Ҙв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв—Ј", "в–‘в–’в–“в–Ҷв–…в–„в–ғ ", "в”Ғв”Ғвқ–в”Ғв”Ғвқ–в”Ғв”Ғ"];
        const og_syms = ["вҳ…", "вҡЎ", "вңӘ", "вҡ”", "вҳ ", "вқӮ"];

        // Unlimited Logic: Har level ke liye 5 alag variations
        function generateAll() {
            let html = '';
            for (let lvl = 1; lvl <= 100; lvl++) {
                for (let v = 1; v <= 3; v++) { // Per level 3 variations
                    let c1 = Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
                    let c2 = Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
                    let s = symbols[Math.floor(Math.random()*symbols.length)];
                    let og = og_syms[Math.floor(Math.random()*og_syms.length)];
                    
                    let bioCode = `[b][c][${c1}]${s}\nв–Ҳв—Ө'в•Ҝ ONE LEVEL PLAYER\n[FF0000]TIME: 00:00:${lvl < 10 ? '0'+lvl : lvl}\n[${c2}]LEVEL ${lvl} ${og}`;

                    html += `
                        <div class="card">
                            <strong style="color:var(--neon)">LEVEL ${lvl} | VAR ${v}</strong>
                            <div class="code-box" id="c-${lvl}-${v}">${bioCode}</div>
                            <button onclick="copyIt('c-${lvl}-${v}')">COPY CODE</button>
                        </div>
                    `;
                }
            }
            grid.innerHTML = html;
        }

        function copyIt(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            alert("Nexus Code Copied!");
        }

        generateAll();
    </script>
</body>
</html>
