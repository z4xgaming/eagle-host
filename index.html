<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLASH PC-SYSTEM v7</title>
    <style>
        body { background-color: #0a0a0a; color: #00ff41; font-family: 'Courier New', Courier, monospace; overflow-x: hidden; }
        .dashboard { border: 2px solid #00ff41; margin: 20px; padding: 20px; box-shadow: 0 0 15px #00ff41; }
        .header { text-align: center; text-transform: uppercase; border-bottom: 1px solid #00ff41; padding-bottom: 10px; }
        .status-box { display: flex; justify-content: space-between; margin-top: 20px; }
        .status-item { background: #111; padding: 10px; border: 1px solid #00ff41; width: 30%; text-align: center; }
        .glow { text-shadow: 0 0 5px #00ff41, 0 0 10px #00ff41; }
        .btn { background: #00ff41; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; margin-top: 20px; width: 100%; }
        .terminal { background: #000; color: #00ff41; height: 150px; margin-top: 20px; padding: 10px; font-size: 12px; overflow-y: scroll; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1 class="glow">EAGLE-HOST PC GATEWAY</h1>
            <p>COMMANDER: vpro4444556 | LEVEL 2 | SEASON 0</p>
        </div>
        
        <div class="status-box">
            <div class="status-item">SYSTEM: <span class="glow">ONLINE</span></div>
            <div class="status-item">REGION: <span class="glow">IND</span></div>
            <div class="status-item">ANTI-BAN: <span class="glow">ACTIVE</span></div>
        </div>

        <div style="margin-top: 30px;">
            <label>TARGET UID:</label><br>
            <input type="text" placeholder="Enter Player UID..." style="width: 100%; background: #000; border: 1px solid #00ff41; color: #fff; padding: 10px; margin-top: 5px;">
            <button class="btn">INJECT REQUEST</button>
        </div>

        <div class="terminal" id="term">
            [SYS] Initializing Eagle-Host Gateway...<br>
            [SYS] Connected to IND Server (S0)...<br>
            [SYS] Welcome, Commander vpro4444556.<br>
        </div>
    </div>
</body>
</html>
