<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z4X CLOUD | Next-Gen Hosting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --accent: #0ea5e9;
            --bg: #020617;
        }
        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(14, 165, 233, 0.05) 0%, transparent 40%);
            font-family: 'Rajdhani', sans-serif;
            color: #e2e8f0;
            overflow-x: hidden;
        }
        .header-font { font-family: 'Orbitron', sans-serif; }
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .neon-border {
            position: relative;
            transition: all 0.3s ease;
        }
        .neon-border:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }
        .btn-glow:hover {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.6);
            transform: translateY(-2px);
        }
        .animate-flicker { animation: flicker 3s infinite; }
        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
            20%, 22%, 24%, 55% { opacity: 0.5; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass-card w-full max-w-lg rounded-[2.5rem] p-8 md:p-12 relative overflow-hidden">
        
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-blue-600/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-sky-600/10 rounded-full blur-3xl"></div>

        <div class="text-center mb-10">
            <h1 class="header-font text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-sky-300 tracking-tighter animate-flicker">
                Z4X CLOUD
            </h1>
            <div class="h-1 w-20 bg-blue-500 mx-auto mt-2 rounded-full shadow-[0_0_10px_#3b82f6]"></div>
            <p class="mt-4 text-gray-400 text-sm tracking-[0.2em] font-medium uppercase">High-Performance Bot Hosting</p>
        </div>

        <div class="space-y-6">
            <div class="space-y-2">
                <label class="text-xs font-bold text-blue-400 uppercase ml-1 tracking-widest">Telegram Bot Token</label>
                <div class="neon-border bg-black/40 border border-slate-800 rounded-2xl p-1">
                    <input type="text" id="token" placeholder="Enter Bot Token" 
                    class="w-full bg-transparent p-3 outline-none text-blue-100 placeholder:text-slate-600">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold text-blue-400 uppercase ml-1 tracking-widest">Your Admin ID</label>
                <div class="neon-border bg-black/40 border border-slate-800 rounded-2xl p-1">
                    <input type="text" id="admin" placeholder="Enter Telegram ID" 
                    class="w-full bg-transparent p-3 outline-none text-blue-100 placeholder:text-slate-600">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold text-blue-400 uppercase ml-1 tracking-widest">Python Script (.py)</label>
                <div id="dropzone" class="border-2 border-dashed border-slate-800 bg-black/20 rounded-2xl p-8 text-center cursor-pointer hover:border-blue-500/50 transition-all group" 
                     onclick="document.getElementById('fileInput').click()">
                    <input type="file" id="fileInput" class="hidden" accept=".py">
                    <div class="text-3xl mb-2 group-hover:scale-110 transition-transform">📄</div>
                    <p id="fileName" class="text-slate-500 text-sm font-medium italic">Click to upload your bot file</p>
                </div>
            </div>

            <button onclick="startDeployment()" 
                class="btn-glow w-full bg-gradient-to-r from-blue-600 to-sky-500 py-5 rounded-2xl font-black text-lg tracking-widest shadow-xl transition-all active:scale-95 flex items-center justify-center gap-3">
                <span>🚀</span> START BOT SERVER
            </button>
        </div>

        <div id="statusContainer" class="mt-8 hidden">
            <div class="flex items-center justify-center gap-3 text-sm">
                <div class="w-2 h-2 bg-blue-500 rounded-full animate-ping"></div>
                <p id="statusText" class="text-blue-400 font-bold uppercase tracking-widest">Processing...</p>
            </div>
        </div>

        <div class="mt-10 pt-6 border-t border-slate-800/50 text-center">
            <p class="text-[10px] text-slate-500 uppercase tracking-widest">System Status: <span class="text-green-500 font-bold">Stable</span></p>
        </div>
    </div>

    <script>
        async function startDeployment() {
            const token = document.getElementById('token').value;
            const admin = document.getElementById('admin').value;
            const fileInput = document.getElementById('fileInput').files[0];
            const statusContainer = document.getElementById('statusContainer');
            const statusText = document.getElementById('statusText');

            if(!token || !admin || !fileInput) {
                alert("Bhai, sari details dalo!");
                return;
            }

            const formData = new FormData();
            formData.append('token', token);
            formData.append('admin', admin);
            formData.append('file', fileInput);

            statusContainer.classList.remove('hidden');
            statusText.innerText = "Connecting to Z4X Core...";

            try {
                const response = await fetch('/deploy', { method: 'POST', body: formData });
                const result = await response.text();
                statusText.innerText = result;
                statusText.className = "text-green-400 font-bold uppercase tracking-widest";
            } catch (error) {
                statusText.innerText = "Link Offline!";
                statusText.className = "text-red-400 font-bold uppercase tracking-widest";
            }
        }

        document.getElementById('fileInput').onchange = function() {
            if(this.files[0]) {
                document.getElementById('fileName').innerText = this.files[0].name;
                document.getElementById('fileName').className = "text-blue-400 font-bold text-sm";
            }
        };
    </script>
</body>
</html>
